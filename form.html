<html lang="en">
  <head>

    <title>Document</title>

  <body>
    <form>

        value="jhon"
        name="userName"
        required
        type="text"
        placeholder="Ex. Jhon Deo"
      />

      <br />

      <input name="phone" type="number" placeholder="Ex. 98xxxxxxxx" />
      <br />
      <br />
      <input name="email" type="email" placeholder="Enter Email" />
      <br />
      <br />
      <input name="password" type="password" placeholder="Enter Password" />
      <br />
      <br />

      <input name="gender" type="radio" /> Female
      <input name="gender" type="radio" /> Others

      <br />

      <input type="checkbox" /> React <input type="checkbox" /> Laravel

      <br />
      <br />

        <option value="">--Select Your Country--</option>
        <option selected value="nepal">Nepal</option>
        <option value="india">India</option>
        <option value="china">China</option>
      </select>
      <br />
      <br />
      <input type="file" name="image" id="" />
      <br />
      <br />
      <input type="" />
      <br />
      <br />
      <input type="submit" value="Submit" />
      <input type="reset" value="Reset" />
    </form>

</html>
